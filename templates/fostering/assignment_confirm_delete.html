{% extends 'base.html' %}

{% block content %}
<div class="container">
    <h1>Delete Foster Assignment</h1>
    <p>Are you sure you want to delete the assignment for "{{ object.pet }}" with "{{ object.foster_name }}"?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Delete</button>
        <a href="{% url 'assignment_list' %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
