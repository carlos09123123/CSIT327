{% extends 'base.html' %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-danger text-white">
                    <h4>Delete Application</h4>
                </div>
                <div class="card-body">
                    <p>Are you sure you want to delete the application for <strong>{{ application.foster.first_name }} {{ application.foster.last_name }}</strong>?</p>

                    <div class="alert alert-warning">
                        <strong>Warning:</strong> This action cannot be undone.
                    </div>

                    <form method="post">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger">Yes, Delete Application</button>
                        <a href="{% url 'application_detail' application.application_id %}" class="btn btn-secondary">Cancel</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
