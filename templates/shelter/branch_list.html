{% extends 'base.html' %}

{% block content %}
<div class="container">
    <h1>Shelter Branches</h1>
    <a href="{% url 'branch_add' %}" class="btn btn-primary">Add Branch</a>
    <table class="table table-striped">
        <thead>
            <tr>
                <th>Name</th>
                <th>City</th>
                <th>Contact</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for branch in branches %}
            <tr>
                <td>{{ branch.name }}</td>
                <td>{{ branch.city }}</td>
                <td>{{ branch.contact_number }}</td>
                <td>
                    <a href="{% url 'branch_edit' branch.pk %}" class="btn btn-sm btn-warning">Edit</a>
                    <a href="{% url 'branch_delete' branch.pk %}" class="btn btn-sm btn-danger">Delete</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
