{% extends 'base.html' %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h3>{% if shelter %}Edit Branch{% else %}Add New Branch{% endif %}</h3>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label">Branch Name *</label>
                            <input type="text" name="name" class="form-control" value="{{ shelter.name|default:'' }}" required>
                            <small class="text-muted">Must be unique across all branches</small>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Street Address *</label>
                            <input type="text" name="address" class="form-control" value="{{ shelter.address|default:'' }}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">City *</label>
                            <input type="text" name="city" class="form-control" value="{{ shelter.city|default:'' }}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Contact Number *</label>
                            <input type="text" name="contact_number" class="form-control" value="{{ shelter.contact_number|default:'' }}" required>
                            <small class="text-muted">Format: +63 XXX XXX XXXX</small>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email Address *</label>
                            <input type="email" name="email" class="form-control" value="{{ shelter.email|default:'' }}" required>
                            <small class="text-muted">Must be unique per branch</small>
                        </div>
                        <div class="text-end">
                            <a href="{% url 'shelter_list' %}" class="btn btn-secondary">Cancel</a>
                            <button type="submit" class="btn btn-primary">Save Branch</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
