{% extends 'base.html' %}

{% block content %}
<div class="container">
    <h1>Delete Intake Record</h1>
    <p>Are you sure you want to delete the intake for "{{ object.pet }}"?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Delete</button>
        <a href="{% url 'intake_list' %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
