{% extends 'base.html' %}

{% block content %}
<div class="container">
    <h1>Delete Adoption</h1>
    <p>Are you sure you want to delete the adoption of "{{ object.pet }}" by "{{ object.adopter }}"?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Delete</button>
        <a href="{% url 'adoption_list' %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
