{% extends 'base.html' %}

{% block content %}
<div class="container">
    <h1>Delete Application</h1>
    <p>Are you sure you want to delete the application for "{{ object.pet.name }}" by "{{ object.adopter }}"?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Delete</button>
        <a href="{% url 'application_list' %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
