{% extends 'base.html' %}

{% block content %}
<div class="container">
    <h1>Home Visits</h1>
    <a href="{% url 'home_visit_add' %}" class="btn btn-primary">Add Home Visit</a>
    <table class="table table-striped">
        <thead>
            <tr>
                <th>Application</th>
                <th>Visit Date</th>
                <th>Result</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for visit in visits %}
            <tr>
                <td>{{ visit.application }}</td>
                <td>{{ visit.visit_date }}</td>
                <td>{{ visit.result }}</td>
                <td>
                    <a href="{% url 'home_visit_edit' visit.pk %}" class="btn btn-sm btn-warning">Edit</a>
                    <a href="{% url 'home_visit_delete' visit.pk %}" class="btn btn-sm btn-danger">Delete</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
