{% extends 'base.html' %}

{% block content %}
<div class="container">
    <h1>Delete Payment</h1>
    <p>Are you sure you want to delete the payment of ${{ object.amount }} for adoption "{{ object.adoption }}"?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Delete</button>
        <a href="{% url 'payment_list' %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
