{% extends 'base.html' %}

{% block content %}
<div class="container">
    <h1>Delete Home Visit</h1>
    <p>Are you sure you want to delete the home visit for application "{{ object.application }}"?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Delete</button>
        <a href="{% url 'home_visit_list' %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
