{% extends 'base.html' %}

{% block content %}
<div class="container">
    <h1>Delete Adopter</h1>
    <p>Are you sure you want to delete "{{ object.first_name }} {{ object.last_name }}"?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Delete</button>
        <a href="{% url 'adopter_list' %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
