{% extends 'base.html' %}

{% block content %}
<div class="container">
    <h1>Payments</h1>
    <a href="{% url 'payment_add' %}" class="btn btn-primary">Add Payment</a>
    <table class="table table-striped">
        <thead>
            <tr>
                <th>Adoption</th>
                <th>Amount</th>
                <th>Method</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for payment in payments %}
            <tr>
                <td>{{ payment.adoption }}</td>
                <td>${{ payment.amount }}</td>
                <td>{{ payment.method }}</td>
                <td>{{ payment.status }}</td>
                <td>
                    <a href="{% url 'payment_edit' payment.pk %}" class="btn btn-sm btn-warning">Edit</a>
                    <a href="{% url 'payment_delete' payment.pk %}" class="btn btn-sm btn-danger">Delete</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
