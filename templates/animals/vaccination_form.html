{% extends 'base.html' %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header">
                    <h3>Add Vaccination for {{ pet.name }}</h3>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label">Vaccine Name</label>
                            <input type="text" name="vaccine_name" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Dose Number</label>
                            <input type="number" name="dose_no" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Vaccination Date</label>
                            <input type="date" name="vaccination_date" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Next Due Date</label>
                            <input type="date" name="next_due_date" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Veterinarian</label>
                            <select name="vet_id" class="form-select">
                                <option value="">Select Vet (Optional)</option>
                                {% for vet in vets %}
                                <option value="{{ vet.vet_id }}">{{ vet.full_name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="text-end">
                            <a href="{% url 'pet_detail' pet.pet_id %}" class="btn btn-secondary">Cancel</a>
                            <button type="submit" class="btn btn-primary">Save Vaccination</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
