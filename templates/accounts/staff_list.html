{% extends 'base.html' %}

{% block content %}
<div class="container">
    <h1>Staff</h1>
    <a href="{% url 'staff_add' %}" class="btn btn-primary">Add Staff</a>
    <table class="table table-striped">
        <thead>
            <tr>
                <th>Name</th>
                <th>Role</th>
                <th>Email</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for staff in staffs %}
            <tr>
                <td>{{ staff.first_name }} {{ staff.last_name }}</td>
                <td>{{ staff.role }}</td>
                <td>{{ staff.email }}</td>
                <td>{{ staff.status }}</td>
                <td>
                    <a href="{% url 'staff_edit' staff.pk %}" class="btn btn-sm btn-warning">Edit</a>
                    <a href="{% url 'staff_delete' staff.pk %}" class="btn btn-sm btn-danger">Delete</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
