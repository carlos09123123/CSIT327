{% extends 'base.html' %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-danger text-white">
                    <h3><i class="fas fa-exclamation-triangle"></i> Confirm Delete</h3>
                </div>
                <div class="card-body text-center">
                    <i class="fas fa-user-times fa-4x text-danger mb-3"></i>
                    <p>Are you sure you want to delete staff member:</p>
                    <h4 class="text-danger">{{ staff.first_name }} {{ staff.last_name }}</h4>
                    <p><strong>Username:</strong> {{ staff.username }}</p>
                    <p><strong>Role:</strong> {{ staff.role }}</p>
                    <p class="text-warning">This action cannot be undone!</p>

                    <form method="post">
                        {% csrf_token %}
                        <div class="mt-3">
                            <a href="{% url 'staff_list' %}" class="btn btn-secondary">Cancel</a>
                            <button type="submit" class="btn btn-danger">Yes, Delete Staff</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
