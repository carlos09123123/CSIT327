<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Shelter Management System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --sand: #f5f0e8;
            --cream: #fdfaf4;
            --bark: #5c3d2e;
            --bark-light: #7a5544;
            --moss: #4a6741;
            --moss-light: #5c7f52;
            --clay: #c4714a;
            --warm-gray: #9e8f82;
            --border: #ddd4c4;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes pawFloat {
            0%, 100% { transform: translateY(0) rotate(-8deg); }
            50%       { transform: translateY(-8px) rotate(-8deg); }
        }

        @keyframes bgDrift {
            0%   { background-position: 0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body {
            min-height: 100vh;
            font-family: 'DM Sans', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #e8e0d4;
            background-image:
                radial-gradient(ellipse at 20% 20%, rgba(74,103,65,0.18) 0%, transparent 55%),
                radial-gradient(ellipse at 80% 80%, rgba(196,113,74,0.15) 0%, transparent 55%),
                radial-gradient(ellipse at 60% 10%, rgba(92,61,46,0.10) 0%, transparent 45%);
            background-size: 200% 200%;
            animation: bgDrift 14s ease infinite;
            position: relative;
            overflow: hidden;
            padding: 24px;
        }

        /* Decorative paw prints scattered in background */
        body::before {
            content: '🐾';
            position: fixed;
            top: 8%;
            left: 6%;
            font-size: 64px;
            opacity: 0.06;
            transform: rotate(-20deg);
            pointer-events: none;
        }
        body::after {
            content: '🐾';
            position: fixed;
            bottom: 10%;
            right: 7%;
            font-size: 80px;
            opacity: 0.05;
            transform: rotate(15deg);
            pointer-events: none;
        }

        .page-wrapper {
            display: flex;
            width: 100%;
            max-width: 860px;
            min-height: 540px;
            border-radius: 24px;
            overflow: hidden;
            box-shadow:
                0 2px 0 rgba(255,255,255,0.6) inset,
                0 32px 80px rgba(92,61,46,0.22),
                0 8px 24px rgba(92,61,46,0.12);
            animation: fadeUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) both;
        }

        /* Left panel */
        .panel-left {
            flex: 1;
            background: var(--bark);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 48px 36px;
            position: relative;
            overflow: hidden;
        }

        .panel-left::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(circle at 30% 70%, rgba(196,113,74,0.35) 0%, transparent 60%),
                radial-gradient(circle at 75% 20%, rgba(74,103,65,0.25) 0%, transparent 50%);
        }

        .panel-left-inner {
            position: relative;
            z-index: 1;
            text-align: center;
        }

        .paw-icon {
            width: 88px;
            height: 88px;
            background: rgba(255,255,255,0.10);
            border: 1.5px solid rgba(255,255,255,0.20);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            animation: pawFloat 3.5s ease-in-out infinite;
        }

        .paw-icon i {
            font-size: 38px;
            color: rgba(255,255,255,0.88);
        }

        .panel-left h1 {
            font-family: 'DM Serif Display', serif;
            font-size: 28px;
            color: #fff;
            line-height: 1.2;
            margin-bottom: 12px;
        }

        .panel-left p {
            font-size: 13.5px;
            color: rgba(255,255,255,0.6);
            line-height: 1.65;
            max-width: 200px;
        }

        .tagline-dots {
            display: flex;
            gap: 6px;
            margin-top: 28px;
            justify-content: center;
        }

        .tagline-dots span {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(255,255,255,0.25);
        }

        .tagline-dots span:nth-child(2) {
            background: var(--clay);
            width: 20px;
            border-radius: 3px;
        }

        /* Right panel */
        .panel-right {
            flex: 1.1;
            background: var(--cream);
            padding: 52px 44px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .panel-right h2 {
            font-family: 'DM Serif Display', serif;
            font-size: 26px;
            color: var(--bark);
            margin-bottom: 6px;
        }

        .panel-right .subtitle {
            font-size: 13px;
            color: var(--warm-gray);
            margin-bottom: 32px;
            font-weight: 300;
        }

        /* Alert styling */
        .alert {
            border-radius: 10px;
            font-size: 13px;
            padding: 11px 14px;
            border: none;
            margin-bottom: 20px;
            background: #fef3f0;
            color: #9a3412;
            border-left: 3px solid var(--clay);
        }

        .alert-success {
            background: #f0faf0;
            color: #166534;
            border-color: var(--moss);
        }

        /* Form fields */
        .field-group {
            margin-bottom: 18px;
        }

        .field-group label {
            display: block;
            font-size: 11.5px;
            font-weight: 500;
            color: var(--bark-light);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 7px;
        }

        .input-wrap {
            position: relative;
        }

        .input-wrap i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--warm-gray);
            font-size: 14px;
            pointer-events: none;
        }

        .form-control {
            width: 100%;
            padding: 12px 14px 12px 40px;
            border: 1.5px solid var(--border);
            border-radius: 10px;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            color: var(--bark);
            background: var(--sand);
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
            outline: none;
        }

        .form-control::placeholder { color: #bdb4aa; }

        .form-control:focus {
            border-color: var(--moss);
            background: #fff;
            box-shadow: 0 0 0 3px rgba(74,103,65,0.12);
        }

        /* Login button */
        .btn-login {
            width: 100%;
            padding: 13px;
            margin-top: 8px;
            border: none;
            border-radius: 10px;
            background: var(--moss);
            color: #fff;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.04em;
            cursor: pointer;
            transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-login:hover {
            background: var(--moss-light);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(74,103,65,0.30);
        }

        .btn-login:active {
            transform: translateY(0);
            box-shadow: none;
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 22px 0;
            color: var(--border);
            font-size: 11px;
            letter-spacing: 0.1em;
            color: var(--warm-gray);
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* Register link */
        .register-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 11px;
            border: 1.5px solid var(--border);
            border-radius: 10px;
            color: var(--bark-light);
            text-decoration: none;
            font-size: 13.5px;
            font-weight: 400;
            transition: border-color 0.2s, background 0.2s, color 0.2s;
        }

        .register-link:hover {
            border-color: var(--bark);
            background: var(--sand);
            color: var(--bark);
            text-decoration: none;
        }

        /* Demo box */
        .demo-box {
            margin-top: 20px;
            background: var(--sand);
            border: 1px dashed var(--border);
            padding: 11px 14px;
            border-radius: 10px;
            font-size: 11.5px;
            text-align: center;
            color: var(--warm-gray);
        }

        .demo-box strong {
            color: var(--bark-light);
            display: block;
            margin-bottom: 3px;
        }

        .demo-box code {
            background: rgba(92,61,46,0.08);
            color: var(--bark);
            padding: 2px 7px;
            border-radius: 5px;
            font-size: 11px;
        }

        /* Responsive */
        @media (max-width: 640px) {
            .panel-left { display: none; }
            .panel-right { padding: 40px 28px; }
            .page-wrapper { max-width: 400px; }
        }
    </style>
</head>

<body>

<div class="page-wrapper">

    <!-- Left decorative panel -->
    <div class="panel-left">
        <div class="panel-left-inner">
            <div class="paw-icon">
                <i class="fas fa-paw"></i>
            </div>
            <h1>Shelter<br>Management</h1>
            <p>Caring for every animal, one paw at a time.</p>
            <div class="tagline-dots">
                <span></span><span></span><span></span>
            </div>
        </div>
    </div>

    <!-- Right form panel -->
    <div class="panel-right">
        <h2>Welcome back</h2>
        <p class="subtitle">Sign in to your account to continue</p>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="post" action="{% url 'login' %}">
            {% csrf_token %}

            <div class="field-group">
                <label>Username</label>
                <div class="input-wrap">
                    <i class="fas fa-user"></i>
                    <input type="text" name="username" class="form-control"
                           placeholder="Enter username" required>
                </div>
            </div>

            <div class="field-group">
                <label>Password</label>
                <div class="input-wrap">
                    <i class="fas fa-lock"></i>
                    <input type="password" name="password" class="form-control"
                           placeholder="Enter password" required>
                </div>
            </div>

            <button type="submit" class="btn-login">
                <i class="fas fa-sign-in-alt"></i> Sign In
            </button>
        </form>

        <div class="divider">OR</div>

        <a href="{% url 'adopter_register' %}" class="register-link">
            <i class="fas fa-user-plus"></i> Create New Account
        </a>

        <div class="demo-box">
            <strong>Demo Login</strong>
            Staff: <code>admin / admin123</code>
        </div>

    </div>
</div>

</body>
</html>
