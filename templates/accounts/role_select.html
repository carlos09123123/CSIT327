{% extends 'base.html' %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8 text-center">
            <h1 class="mb-4">Register as:</h1>
            <div class="row">
                <div class="col-md-4 mb-3">
                    <div class="card">
                        <div class="card-body">
                            <i class="fas fa-user fa-3x mb-3"></i>
                            <h4>Adopter</h4>
                            <p>I want to adopt a pet</p>
                            <a href="{% url 'adopter_register' %}" class="btn btn-primary">Register as Adopter</a>
                        </div>
                    </div>
                </div>
                <div class="col-md-4 mb-3">
                    <div class="card">
                        <div class="card-body">
                            <i class="fas fa-user-md fa-3x mb-3"></i>
                            <h4>Veterinarian</h4>
                            <p>I want to provide medical services</p>
                            <a href="{% url 'vet_register' %}" class="btn btn-info">Register as Vet</a>
                        </div>
                    </div>
                </div>
                <div class="col-md-4 mb-3">
                    <div class="card">
                        <div class="card-body">
                            <i class="fas fa-hands-helping fa-3x mb-3"></i>
                            <h4>Volunteer</h4>
                            <p>I want to help at the shelter</p>
                            <a href="{% url 'volunteer_register' %}" class="btn btn-success">Register as Volunteer</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
